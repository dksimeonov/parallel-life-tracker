{% extends "base.html" %}

{% block title %}Milestone Form{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-7">
            <h1 class="mb-4">
                {% if object %}Edit Milestone{% else %}Create Milestone{% endif %}
            </h1>

            <form method="post">
                {% csrf_token %}

                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {% for error in field.errors %}
                            <div class="text-danger small">{{ error }}</div>
                        {% endfor %}
                    </div>
                {% endfor %}

                <button class="btn btn-success" type="submit">Save</button>
            </form>
        </div>
    </div>
{% endblock %}
