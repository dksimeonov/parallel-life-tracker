{% extends "base.html" %}

{% block title %}Delete Reflection{% endblock %}

{% block content %}
    <h1>Delete Reflection</h1>
    <p>Are you sure you want to delete "{{ object.title }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Yes, delete</button>
    </form>
{% endblock %}
